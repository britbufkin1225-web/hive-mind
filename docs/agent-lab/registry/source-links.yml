# Source links — machine-readable official-source registry for candidate agents.
# Documentation/data only.
#
# DO NOT INVENT URLs. Where an official URL is not yet verified from source text, set the field
# to verify-required and verification_status: pending. A human verifies before promotion
# (see workflow-rules.yml: source-links-verify-required).
#
# Fields:
#   id                   matches agents.yml id
#   official_source_url  product homepage / official source
#   docs_url             official documentation
#   pricing_url          official pricing / plans
#   verification_status  pending | verified
#   notes                free text

sources:
